# PROVIDERS cho SDK runtime SHB #132 — pattern battle (providers.yaml + ${VAR} từ .env).
# Mọi provider nói giọng Anthropic API (SDK chỉ đổi base_url + auth token).
# api_key: ${tên_biến} — tên biến trong .env (repo_root/.env, gitignored). KHÔNG ghi key thẳng.
# KEY KHÔNG BAO GIỜ ra FE — API /models chỉ trả has_key true/false.
#
# Chọn provider mức server: env SHB_PROVIDER=<name> (bỏ trống = default bên dưới).
# Per-conversation (chọn trên UI) = D-45b (c) — làm sau, đọc conv.provider.

providers:
  - name: claude-cli
    kind: subscription          # KHÔNG set env — SDK dùng auth Claude CLI (bundle, không API key)
    default: true
    models: [haiku, sonnet, opus]
    sub_model: sonnet           # ⚠ TẠM cho S17 bench Phase 2 (fairness: cả 2 bên sonnet) — GỠ sau RUN
    note: "đường chính khi máy CÓ Claude CLI login (~/.claude); standalone không login → chọn zai"

  - name: zai
    base_url: https://api.z.ai/api/anthropic
    api_key: ${zai}
    models: [glm-4.6, glm-4.5, glm-4.5-air, glm-4.5-flash]
    note: "GLM z.ai — đường KEYED không phụ thuộc CLI auth (dùng cho standalone demo Đà Nẵng);
      cost_usd SDK tính theo giá Anthropic → KHÔNG TIN với provider ngoài"

  # Mẫu thêm (điền key vào .env rồi mở comment):
  # - name: anthropic
  #   base_url: https://api.anthropic.com   # hoặc bỏ base_url dùng mặc định SDK
  #   api_key: ${ANTHROPIC_API_KEY}
  #   models: [claude-sonnet-4-5, claude-haiku-4-5]

  - name: wrap
    # wrapper nội bộ psa.team — router đa-provider nói CẢ 2 giọng (Anthropic + OpenAI), route
    # theo tên model → mở đường GPT (người xác nhận 18/7 dùng được). SDK tự nối /v1/messages
    # → base_url BỎ /v1. Key: WRAP_API_KEY trong .env (copy từ battle/.env).
    base_url: http://cli-8.psa.team:8317
    api_key: ${WRAP_API_KEY}
    models: [gpt-5.5, gpt-5.6-sol, gpt-5.6-luna, gpt-5.6-terra, gpt-5.4, gpt-5.4-mini]
    sub_model: gpt-5.4-mini   # sub KHÔNG dùng alias haiku (wrapper GPT không map tên claude → 502);
                              # dùng model rẻ nhất trong models. (tester T12-5 PROD: wrap=default → sub chết câm)
    note: "GPT qua wrapper psa.team — so sánh ngoài nhà Claude; cost_usd SDK KHÔNG TIN với provider ngoài"

  - name: local
    # Ollama chạy NGAY TRÊN MÁY (endpoint giọng Anthropic có sẵn từ Ollama ≥0.12 — verify 18/7
    # bản 0.32.1 trả đúng error-envelope Anthropic). Demo chủ quyền dữ liệu: model on-prem,
    # dữ liệu không rời hạ tầng. Tool-call model 8B yếu hơn Claude/GLM — demo phụ, không phải
    # đường chính (D-45 note). Cần: `ollama serve` + `ollama pull qwen3:8b` + LOCAL_KEY bất kỳ
    # trong .env (Ollama không kiểm key — registry đòi biến tồn tại).
    base_url: http://localhost:11434
    api_key: ${LOCAL_KEY}
    models: [qwen3:8b]
    sub_model: qwen3:8b   # sub KHÔNG dùng alias haiku (Ollama không map tên claude)
    note: "model local qua Ollama — on-prem/chủ quyền dữ liệu; cost_usd KHÔNG TIN"
