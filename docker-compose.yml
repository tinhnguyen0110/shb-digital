services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: shb
      POSTGRES_PASSWORD: shb
      POSTGRES_DB: shb
    ports:
      - "5432:5432"
    volumes:
      - shb_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shb -d shb"]
      interval: 2s
      timeout: 3s
      retries: 20

volumes:
  shb_pg_data:
