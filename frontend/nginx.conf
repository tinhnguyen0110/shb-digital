# nginx BANK Digital FE (S10) — serve static SPA + proxy /api → backend (compose network).
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback: route không-file → index.html (React Router client-side).
    location / {
        try_files $uri $uri/ /index.html;
    }

    # S14 cache-stale fix (FE verify prod bắt được): index.html KHÔNG cache (browser luôn
    # revalidate → deploy mới ăn ngay, hết cảnh khách/giám khảo kẹt bundle cũ tới khi hard-refresh).
    # SPA fallback internal-redirect về /index.html cũng rơi vào block này → header áp đủ mọi route.
    location = /index.html {
        add_header Cache-Control "no-cache";
    }

    # Hash-asset (index-<hash>.js/css) đổi tên mỗi build → cache dài + immutable an toàn.
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # /api → backend service (compose DNS 'backend'). SSE-safe: tắt buffer + timeout dài cho stream.
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # SSE (GET /api/conversations/{id}/sse) — KHÔNG buffer + connection sống dài.
        proxy_buffering off;
        proxy_cache off;
        proxy_set_header Connection "";
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
}
