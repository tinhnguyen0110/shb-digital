# nginx BANK Digital FE (S10) — serve static SPA + proxy /api → backend (compose network).
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback: route không-file → index.html (React Router client-side).
    location / {
        try_files $uri $uri/ /index.html;
    }

    # /api → backend service (compose DNS 'backend'). SSE-safe: tắt buffer + timeout dài cho stream.
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # SSE (GET /api/conversations/{id}/sse) — KHÔNG buffer + connection sống dài.
        proxy_buffering off;
        proxy_cache off;
        proxy_set_header Connection "";
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
}
