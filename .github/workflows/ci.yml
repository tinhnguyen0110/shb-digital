name: CI

# Bằng chứng khách quan (badge) — chạy trên push master + mọi PR.
on:
  push:
    branches: [master]
  pull_request:

jobs:
  backend:
    name: Backend (pytest + ruff)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: shb
          POSTGRES_PASSWORD: shb
          POSTGRES_DB: shb_test
        ports:
          - 5432:5432
        # đợi PG sẵn trước khi job chạy (conftest connect ngay khi collect)
        options: >-
          --health-cmd "pg_isready -U shb -d shb_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    env:
      TEST_DATABASE_URL: postgresql://shb:shb@localhost:5432/shb_test
      DATABASE_URL: postgresql://shb:shb@localhost:5432/shb_test
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "0.8.15"

      - name: uv sync (frozen, đủ dev-deps cho pytest/ruff)
        run: uv sync --frozen

      # conftest auto-setup TỰ migrate+seed shb_test khi TEST_DATABASE_URL set — nhưng seed cần LAB
      # sibling / snapshot. CI clone-trần KHÔNG có LAB → seed_from_lab fallback snapshot (deploy/seed).
      # Chạy tường minh migrate+seed trước để chắc (idempotent; conftest _db_ready sẽ thấy đã sẵn).
      - name: Migrate + seed shb_test
        run: |
          uv run alembic upgrade head
          uv run python -m app.db.seed_from_lab
          uv run python -m app.db.seed_users

      - name: Pytest (live-SDK tự skip — không key CI, đúng thiết kế)
        run: uv run pytest -q

      - name: Ruff check
        run: uv run ruff check .

      - name: Ruff format --check
        run: uv run ruff format --check .

  frontend:
    name: Frontend (vitest + tsc)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: npm ci
        run: npm ci

      - name: Vitest
        run: npm run test

      - name: Typecheck (tsc)
        run: npm run typecheck
